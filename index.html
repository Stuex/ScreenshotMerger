<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Isolation Filter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }

        p {
            color: #a0a0a0;
            max-width: 600px;
            text-align: center;
            margin-bottom: 25px;
        }

        .controls {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        input[type="file"] {
            color: #a0a0a0;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
        }

        .value-display {
            font-mono: monospace;
            width: 30px;
            text-align: right;
        }

        .viewports {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        .panel {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }

        .panel h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .img-container {
            width: 100%;
            min-height: 300px;
            background-color: #0b0b0b;
            border: 2px dashed #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        img, canvas {
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <h1>Shadow & Dark Tone Isolator</h1>
    <p>Upload an image. Colors and bright spots turn black. Shades of black turn white.</p>

    <div class="controls">
        <div class="control-group">
            <label for="upload">Choose an Image</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        
        <div class="control-group">
            <label for="threshold">Darkness Threshold (0 - 255)</label>
            <div class="slider-container">
                <input type="range" id="threshold" min="0" max="255" value="60">
                <span id="threshold-val" class="value-display">60</span>
            </div>
            <small style="color: #777;">Higher values capture lighter shades of gray/dark colors.</small>
        </div>
    </div>

    <div class="viewports">
        <div class="panel">
            <h3>Original Image</h3>
            <div class="img-container">
                <img id="original-preview" src="" alt="No image uploaded yet" style="display: none;">
                <span id="orig-placeholder" style="color: #555;">Waiting for file...</span>
            </div>
        </div>

        <div class="panel">
            <h3>Filtered Output</h3>
            <div class="img-container">
                <canvas id="output-canvas" style="display: none;"></canvas>
                <span id="canvas-placeholder" style="color: #555;">Waiting for file...</span>
            </div>
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const thresholdSlider = document.getElementById('threshold');
        const thresholdVal = document.getElementById('threshold-val');
        const originalPreview = document.getElementById('original-preview');
        const outputCanvas = document.getElementById('output-canvas');
        
        const origPlaceholder = document.getElementById('orig-placeholder');
        const canvasPlaceholder = document.getElementById('canvas-placeholder');

        let loadedImage = null;

        // Handle image upload
        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImage = new Image();
                loadedImage.onload = function() {
                    // Show elements and hide placeholders
                    originalPreview.src = event.target.result;
                    originalPreview.style.display = 'block';
                    origPlaceholder.style.display = 'none';
                    
                    outputCanvas.style.display = 'block';
                    canvasPlaceholder.style.display = 'none';

                    // Run the filter
                    processImage();
                };
                loadedImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Update threshold text and re-process image when slider moves
        thresholdSlider.addEventListener('input', function() {
            thresholdVal.textContent = this.value;
            if (loadedImage) {
                processImage();
            }
        });

        // The core image processing engine
        function processImage() {
            if (!loadedImage) return;

            const ctx = outputCanvas.getContext('2d');
            
            // Match canvas size to the source image
            outputCanvas.width = loadedImage.naturalWidth;
            outputCanvas.height = loadedImage.naturalHeight;

            // Draw original image onto the canvas to grab its pixels
            ctx.drawImage(loadedImage, 0, 0);

            // Fetch the pixel array
            const imgData = ctx.getImageData(0, 0, outputCanvas.width, outputCanvas.height);
            const data = imgData.data;
            
            // Get current slider threshold value
            const threshold = parseInt(thresholdSlider.value, 10);

            // Step through every pixel (4 elements per pixel: Red, Green, Blue, Alpha)
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];     // Red channel
                const g = data[i + 1]; // Green channel
                const b = data[i + 2]; // Blue channel

                // Decision rule: Is the pixel dark enough to count as a shade of black?
                // Checks if Red, Green, AND Blue are all under the threshold.
                if (r < threshold && g < threshold && b < threshold) {
                    // Turn it white
                    data[i] = 255;     // R
                    data[i + 1] = 255; // G
                    data[i + 2] = 255; // B
                } else {
                    // Turn it black
                    data[i] = 0;       // R
                    data[i + 1] = 0;   // G
                    data[i + 2] = 0;   // B
                }
                // data[i+3] is Alpha (transparency), we leave it untouched (255)
            }

            // Repaint the modified pixels back down onto the canvas canvas
            ctx.putImageData(imgData, 0, 0);
        }
    </script>
</body>
</html>
